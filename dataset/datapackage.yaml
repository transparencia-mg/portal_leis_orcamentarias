name: portal_leis_orcamentarias
owner_org: ''
profile: data-package
resources:
  - description: Conjunto de links para diversos downloads sobre Leis Orçamentárias do Estado de Minas Gerais
    dialect:
      delimiter: ;
    encoding: utf-8-sig
    format: csv
    hashing: md5
    name: downloads
    path: data/downloads.csv
    profile: tabular-data-resource
    schema:
      fields:
        - name: descricao
          type: string
        - name: link
          type: string
    scheme: file
    title: Links de Leis Orçamentárias
  - description: Conjunto de links para Leis de Diretrizes Orçamentárias
    dialect:
      delimiter: ;
    encoding: utf-8-sig
    format: csv
    hashing: md5
    name: lei_diretrizes_orcamentarias
    path: data/lei_diretrizes_orcamentarias.csv
    profile: tabular-data-resource
    schema:
      fields:
        - name: descricao
          type: string
        - name: lei_estadual
          type: string
        - name: anexo_i_metas_fiscais
          type: any
        - name: anexo_ii_riscos_fiscais
          type: any
        - name: anexo_iii_metodologia_calculo_premissas_utilizadas
          type: any
        - name: anexo_iv_metas_prioridades
          type: any
    scheme: file
    title: Leis de Diretrizes Orçamentárias
  - description: Conjunto de links para Leis Orçamentárias Anuais
    dialect:
      delimiter: ;
    encoding: utf-8-sig
    format: csv
    hashing: md5
    name: lei_orcamentaria_anual
    path: data/lei_orcamentaria_anual.csv
    profile: tabular-data-resource
    schema:
      fields:
        - name: descricao
          type: string
        - name: legislacao
          type: string
        - name: volumes
          type: string
        - name: base_dados
          type: any
    scheme: file
    title: Lei Orçamentária Anual
  - description: Conjunto de links para os Planos Mineiro de Desenvolvimento Integrado
    dialect:
      delimiter: ;
    encoding: utf-8-sig
    format: csv
    hashing: md5
    name: plano_mineiro_desenvolvimento_integrado
    path: data/plano_mineiro_desenvolvimento_integrado.csv
    profile: tabular-data-resource
    schema:
      fields:
        - name: descricao
          type: string
        - name: link
          type: string
    scheme: file
    title: Plano Mineiro de Desenvolvimento Integrado
  - description: Conjunto de links para os Planos Anuais de Ação Governamental
    dialect:
      delimiter: ;
    encoding: utf-8-sig
    format: csv
    hashing: md5
    name: plano_anual_acao_governamental
    path: data/plano_anual_acao_governamental.csv
    profile: tabular-data-resource
    schema:
      fields:
        - name: descricao
          type: string
        - name: link
          type: string
    scheme: file
    title: Plano Anual de Ação Governamental
title: Leis Orçamentárias
